<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Man Poster Gallery</title>

    <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    @keyframes slideInLeft {
        from {
            opacity: 0;
            transform: translateX(-50px) rotateY(25deg);
        }
        to {
            opacity: 1;
            transform: translateX(0) rotateY(0);
        }
    }

    @keyframes slideInRight {
        from {
            opacity: 0;
            transform: translateX(50px) rotateY(-25deg);
        }
        to {
            opacity: 1;
            transform: translateX(0) rotateY(0);
        }
    }

    @keyframes popIn {
        0% {
            opacity: 0;
            transform: scale(0.5) rotate(-10deg);
        }
        50% {
            transform: scale(1.05) rotate(2deg);
        }
        100% {
            opacity: 1;
            transform: scale(1) rotate(0);
        }
    }

    @keyframes glow {
        0%, 100% {
            filter: drop-shadow(0 0 5px rgba(220, 38, 38, 0.4));
        }
        50% {
            filter: drop-shadow(0 0 20px rgba(220, 38, 38, 0.8));
        }
    }

    @keyframes flip {
        0% {
            transform: rotateY(0);
        }
        100% {
            transform: rotateY(360deg);
        }
    }

    @keyframes shimmerLoad {
        0% {
            background-position: -100% 0;
        }
        100% {
            background-position: 100% 0;
        }
    }

    @keyframes bounce {
        0%, 100% {
            transform: translateY(0);
        }
        50% {
            transform: translateY(-12px);
        }
    }

    body{
        font-family:Arial, sans-serif;
        background:linear-gradient(135deg, #0a0e27 0%, #1a0f2e 50%, #0f1529 100%);
        min-height:100vh;
        padding:30px 15px;
        position: relative;
    }

    body::after {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 50%, rgba(220, 38, 38, 0.08) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(37, 99, 235, 0.08) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
    }

    .container{
        max-width:1300px;
        margin:auto;
        position: relative;
        z-index: 1;
    }

    h1{
        text-align:center;
        color:#ffffff;
        margin-bottom:35px;
        font-size:42px;
        animation: slideInLeft 0.8s ease-out;
        text-shadow: 0 0 20px rgba(220, 38, 38, 0.5);
    }

    .gallery{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
        gap:25px;
    }

    .poster-card{
        background: linear-gradient(135deg, #1a1f3a 0%, #0f1529 100%);
        border-radius:14px;
        overflow:hidden;
        box-shadow: 0 5px 18px rgba(220, 38, 38, 0.2), 0 5px 18px rgba(37, 99, 235, 0.15);
        transition:all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        animation: popIn 0.7s ease-out backwards;
        position: relative;
        transform-style: preserve-3d;
        border: 1px solid rgba(220, 38, 38, 0.2);
    }

    .poster-card:nth-child(odd) {
        animation: slideInLeft 0.7s ease-out backwards;
    }

    .poster-card:nth-child(even) {
        animation: slideInRight 0.7s ease-out backwards;
    }

    .poster-card:nth-child(1) { animation-delay: 0.1s; }
    .poster-card:nth-child(2) { animation-delay: 0.15s; }
    .poster-card:nth-child(3) { animation-delay: 0.2s; }
    .poster-card:nth-child(4) { animation-delay: 0.25s; }
    .poster-card:nth-child(5) { animation-delay: 0.3s; }
    .poster-card:nth-child(6) { animation-delay: 0.35s; }
    .poster-card:nth-child(7) { animation-delay: 0.4s; }
    .poster-card:nth-child(8) { animation-delay: 0.45s; }
    .poster-card:nth-child(9) { animation-delay: 0.5s; }
    .poster-card:nth-child(10) { animation-delay: 0.55s; }
    .poster-card:nth-child(n+11) { animation-delay: 0.6s; }

    .poster-card:hover{
        transform: translateY(-15px) scale(1.06) rotateX(8deg);
        box-shadow: 0 20px 40px rgba(220, 38, 38, 0.4), 0 10px 25px rgba(37, 99, 235, 0.3);
        border-color: rgba(220, 38, 38, 0.5);
    }

    .poster-card.upcoming {
        animation: glow 1.5s ease-in-out infinite;
    }

    .poster-image{
        width:100%;
        height:330px;
        overflow:hidden;
        position: relative;
    }

    .poster-image.loading {
        background: linear-gradient(90deg, #1a1f3a 25%, #0f1529 50%, #1a1f3a 75%);
        background-size: 200% 100%;
        animation: shimmerLoad 1.5s infinite;
    }

    .poster-image img{
        width:100%;
        height:100%;
        object-fit:cover;
        transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.5s;
        filter: brightness(1) blur(0px);
    }

    .poster-card:hover img{
        transform: scale(1.15) rotate(2deg) translateZ(20px);
        filter: brightness(1.15) blur(0px);
    }

    .poster-info{
        padding:15px;
        background: linear-gradient(180deg, rgba(10, 14, 39, 0.95), rgba(10, 14, 39, 1));
        border-top: 2px solid rgba(220, 38, 38, 0.3);
    }

    .poster-title{
        color:white;
        font-size:18px;
        font-weight:bold;
        margin-bottom:10px;
        transition: all 0.3s ease;
    }

    .poster-card:hover .poster-title {
        color: #f87171;
        text-shadow: 0 0 10px rgba(220, 38, 38, 0.6);
        transform: translateX(4px);
    }

    .poster-meta{
        display:flex;
        justify-content:space-between;
        align-items:center;
        color:#cbd5e1;
        font-size:14px;
    }

    .poster-year {
        background: rgba(37, 99, 235, 0.2);
        padding: 4px 10px;
        border-radius: 6px;
        transition: all 0.3s ease;
    }

    .poster-card:hover .poster-year {
        background: rgba(37, 99, 235, 0.4);
        color: #93c5fd;
    }

    .rating{
        color:#fbbf24;
        font-weight:bold;
        animation: bounce 2s ease-in-out infinite;
        background: rgba(220, 38, 38, 0.15);
        padding: 4px 8px;
        border-radius: 4px;
    }

    .poster-card:hover .rating {
        background: rgba(220, 38, 38, 0.3);
        color: #fca5a5;
    }

    .poster-card:nth-child(2n) .rating {
        animation-delay: 0.3s;
    }

    .upcoming-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: linear-gradient(135deg, #dc2626, #991b1b);
        color: white;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: bold;
        z-index: 10;
        animation: flip 3s linear infinite;
        box-shadow: 0 0 15px rgba(220, 38, 38, 0.6);
    }

    @media(max-width:768px){
        h1{
            font-size:30px;
        }

        .poster-image{
            height:260px;
        }

        .poster-card:hover {
            transform: translateY(-10px) scale(1.03);
        }
    }
</style>
</head>
<body>

    <div class="container">
        <h1>🕷️ Spider-Man Movie Gallery</h1>
        <p class="subtitle">Explore every swing through cinema</p>

        <div class="gallery" id="gallery"></div>
    </div>

    <script>

        const movies = [

{
    title: "Spider-Man",
    year: 2002,
    rating: 7.4,
    image: "images/download.jpg"
},

{
    title: "Spider-Man 2",
    year: 2004,
    rating: 8.0,
    image: "images/download 1.jpg"
},

{
    title: "Spider-Man 3",
    year: 2007,
    rating: 6.3,
    image: "https://upload.wikimedia.org/wikipedia/en/7/7a/Spider-Man_3%2C_International_Poster.jpg"
},

{
    title: "The Amazing Spider-Man",
    year: 2012,
    rating: 6.9,
    image: "images/download 2.jpg"
},

{
    title: "The Amazing Spider-Man 2",
    year: 2014,
    rating: 6.6,
    image: "images/download 3.jpg"
},

{
    title: "Spider-Man: Homecoming",
    year: 2017,
    rating: 7.4,
    image: "https://upload.wikimedia.org/wikipedia/en/f/f9/Spider-Man_Homecoming_poster.jpg"
},

{
    title: "Spider-Man: Into the Spider-Verse",
    year: 2018,
    rating: 8.4,
    image: "images/download 4.jpg"
},

{
    title: "Spider-Man: Far From Home",
    year: 2019,
    rating: 7.5,
    image: "https://upload.wikimedia.org/wikipedia/en/b/bd/Spider-Man_Far_From_Home_poster.jpg"
},

{
    title: "Spider-Man: No Way Home",
    year: 2021,
    rating: 8.2,
    image: "https://upload.wikimedia.org/wikipedia/en/0/00/Spider-Man_No_Way_Home_poster.jpg"
},

{
    title: "Spider-Man: Across the Spider-Verse",
    year: 2023,
    rating: 8.5,
    image: "images/download 5.jpg"
},

{
    title: "Spider-Man: Brand New Day",
    year: 2026,
    rating: "Upcoming",
    image: "images/1.jpg"
}

];
       
        const gallery = document.getElementById("gallery");

        movies.forEach((movie, index) => {
            const card = document.createElement("div");
            card.className = `poster-card ${movie.upcoming ? 'upcoming' : ''}`;

            const ratingDisplay = typeof movie.rating === 'number' 
                ? `<span class="star">★</span> ${movie.rating}` 
                : movie.rating;

            card.innerHTML = `
                ${movie.upcoming ? '<div class="upcoming-badge">Coming Soon</div>' : ''}
                <div class="poster-image loading">
                    <img src="${movie.image}" alt="${movie.title}" loading="lazy">
                </div>
                <div class="poster-info">
                    <div class="poster-title">${movie.title}</div>
                    <div class="poster-meta">
                        <span class="poster-year">${movie.year}</span>
                        <span class="rating">${ratingDisplay}</span>
                    </div>
                </div>
            `;

            const img = card.querySelector('img');
            img.addEventListener('load', () => {
                card.querySelector('.poster-image').classList.remove('loading');
            });

            gallery.appendChild(card);
        });
    </script>

</body>
</html>
```
