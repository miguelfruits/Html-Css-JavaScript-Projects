# Spider-Man Movie Poster Gallery Code

```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Man Poster Gallery</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
            padding:30px 15px;
        }

        .container{
            max-width:1300px;
            margin:auto;
        }

        h1{
            text-align:center;
            color:white;
            margin-bottom:35px;
            font-size:42px;
        }

        .gallery{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:25px;
        }

        .poster-card{
            background:#111827;
            border-radius:14px;
            overflow:hidden;
            box-shadow:0 5px 18px rgba(0,0,0,0.4);
            transition:0.3s;
        }

        .poster-card:hover{
            transform:translateY(-10px) scale(1.02);
        }

        .poster-image{
            width:100%;
            height:330px;
            overflow:hidden;
        }

        .poster-image img{
            width:100%;
            height:100%;
            object-fit:cover;
            transition:0.4s;
        }

        .poster-card:hover img{
            transform:scale(1.08);
        }

        .poster-info{
            padding:15px;
        }

        .poster-title{
            color:white;
            font-size:18px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .poster-meta{
            display:flex;
            justify-content:space-between;
            align-items:center;
            color:#cbd5e1;
            font-size:14px;
        }

        .rating{
            color:#facc15;
            font-weight:bold;
        }

        @media(max-width:768px){
            h1{
                font-size:30px;
            }

            .poster-image{
                height:260px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>🕷️ Spider-Man Movie Poster Gallery</h1>

        <div class="gallery" id="gallery"></div>

    </div>

    <script>

  const movies = [

{
    title: "Spider-Man",
    year: 2002,
    rating: 7.4,
    image: "https://upload.wikimedia.org/wikipedia/en/f/f3/Spider-Man2002Poster.jpg"
},

{
    title: "Spider-Man 2",
    year: 2004,
    rating: 8.0,
    image: "https://upload.wikimedia.org/wikipedia/en/0/02/Spider-Man_2_Poster.jpg"
},

{
    title: "Spider-Man 3",
    year: 2007,
    rating: 6.3,
    image: "https://upload.wikimedia.org/wikipedia/en/7/7a/Spider-Man_3%2C_International_Poster.jpg"
},

{
    title: "The Amazing Spider-Man",
    year: 2012,
    rating: 6.9,
    image: "https://upload.wikimedia.org/wikipedia/en/0/02/The_Amazing_Spider-Man_theatrical_poster.jpeg"
},

{
    title: "The Amazing Spider-Man 2",
    year: 2014,
    rating: 6.6,
    image: "https://upload.wikimedia.org/wikipedia/en/0/02/The_Amazing_Spider-Man_2_poster.jpg"
},

{
    title: "Spider-Man: Homecoming",
    year: 2017,
    rating: 7.4,
    image: "https://upload.wikimedia.org/wikipedia/en/f/f9/Spider-Man_Homecoming_poster.jpg"
},

{
    title: "Spider-Man: Into the Spider-Verse",
    year: 2018,
    rating: 8.4,
    image: "https://upload.wikimedia.org/wikipedia/en/f/fb/Into_the_Spider-Verse_poster.jpg"
},

{
    title: "Spider-Man: Far From Home",
    year: 2019,
    rating: 7.5,
    image: "https://upload.wikimedia.org/wikipedia/en/b/bd/Spider-Man_Far_From_Home_poster.jpg"
},

{
    title: "Spider-Man: No Way Home",
    year: 2021,
    rating: 8.2,
    image: "https://upload.wikimedia.org/wikipedia/en/0/00/Spider-Man_No_Way_Home_poster.jpg"
},

{
    title: "Spider-Man: Across the Spider-Verse",
    year: 2023,
    rating: 8.5,
    image: "https://upload.wikimedia.org/wikipedia/en/f/f0/Spider-Man_Across_the_Spider-Verse_poster.jpg"
},

{
    title: "Spider-Man: Brand New Day",
    year: 2026,
    rating: "Upcoming",
    image: "https://images.unsplash.com/photo-1531259683007-016a7b628fc3?q=80&w=1000&auto=format&fit=crop"
}

];
        const gallery = document.getElementById("gallery");

        movies.forEach(movie => {

            const card = document.createElement("div");

            card.className = "poster-card";

            card.innerHTML = `

                <div class="poster-image">
                    <img src="${movie.image}" alt="${movie.title}">
                </div>

                <div class="poster-info">

                    <div class="poster-title">
                        ${movie.title}
                    </div>

                    <div class="poster-meta">
                        <span>${movie.year}</span>
                        <span class="rating">★ ${movie.rating}</span>
                    </div>

                </div>

            `;

            gallery.appendChild(card);

        });

    </script>

</body>
</html>
```
