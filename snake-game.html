<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 36px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            font-weight: 400;
        }

        .info-bar {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 25px;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }

        .info-value.score {
            color: #1976d2;
        }

        .info-value.level {
            color: #f57c00;
        }

        .info-value.highscore {
            color: #388e3c;
        }

        #gameCanvas {
            background: #8B6F47;
            border: 3px solid #333;
            border-radius: 10px;
            display: block;
            margin: 0 auto 25px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
            min-width: 140px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
            border-color: #bbb;
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        .controls {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 20px;
            margin-top: 25px;
            border-top: 2px solid #eee;
        }

        .controls-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .controls-text {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
            text-align: left;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #333;
        }

        .modal-message {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .modal-score {
            font-size: 32px;
            font-weight: 700;
            color: #1976d2;
            margin: 20px 0;
        }

        .modal-button {
            padding: 12px 40px;
            font-size: 14px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .modal-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 5px;
            }

            #gameCanvas {
                width: 100% !important;
                height: auto !important;
            }

            button {
                min-width: 120px;
                padding: 10px 20px;
                font-size: 12px;
            }

            .info-bar {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Snake Game</h1>
        <p class="subtitle">Eat the food and grow!</p>

        <div class="info-bar">
            <div class="info-item">
                <div class="info-label">Score</div>
                <div class="info-value score" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Level</div>
                <div class="info-value level" id="level">1</div>
            </div>
            <div class="info-item">
                <div class="info-label">High Score</div>
                <div class="info-value highscore" id="highScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="button-group">
            <button class="btn-primary" id="startBtn">Start Game</button>
            <button class="btn-secondary" id="pauseBtn">Pause</button>
            <button class="btn-secondary" id="resetBtn">New Game</button>
        </div>

        <div class="controls">
            <div class="controls-title">How to Play</div>
            <div class="controls-text">
                <strong>Arrow Keys:</strong> Move up, down, left, right<br>
                <strong>Space:</strong> Pause/Resume<br>
                <strong>Objective:</strong> Eat the red food to grow and increase score<br>
                <strong>Avoid:</strong> Hitting walls or yourself
            </div>
        </div>
    </div>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Game Over!</div>
            <div class="modal-message" id="modalMessage">You hit a wall or yourself.</div>
            <div class="modal-score" id="modalScore">Score: 0</div>
            <button class="modal-button" id="modalButton">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const highScoreEl = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const gameOverModal = document.getElementById('gameOverModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalScore = document.getElementById('modalScore');
        const modalButton = document.getElementById('modalButton');

        // Game variables
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let level = 1;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameActive = false;
        let gamePaused = false;
        let gameSpeed = 150;

        // Initialize
        loadHighScore();
        drawGame();

        // Event listeners
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        resetBtn.addEventListener('click', resetGame);
        modalButton.addEventListener('click', () => {
            gameOverModal.classList.remove('show');
            resetGame();
            startGame();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                togglePause();
                return;
            }

            const key = e.key.toLowerCase();
            if (key === 'arrowup' || key === 'w') {
                if (direction.y === 0) nextDirection = { x: 0, y: -1 };
            } else if (key === 'arrowdown' || key === 's') {
                if (direction.y === 0) nextDirection = { x: 0, y: 1 };
            } else if (key === 'arrowleft' || key === 'a') {
                if (direction.x === 0) nextDirection = { x: -1, y: 0 };
            } else if (key === 'arrowright' || key === 'd') {
                if (direction.x === 0) nextDirection = { x: 1, y: 0 };
            }
        });

        function startGame() {
            if (!gameActive) {
                gameActive = true;
                gamePaused = false;
                startBtn.textContent = 'Resume';
                pauseBtn.disabled = false;
                gameLoop();
            }
        }

        function togglePause() {
            if (gameActive) {
                gamePaused = !gamePaused;
                pauseBtn.textContent = gamePaused ? 'Resume' : 'Pause';
                if (!gamePaused) {
                    gameLoop();
                }
            }
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            level = 1;
            gameSpeed = 150;
            gameActive = false;
            gamePaused = false;
            startBtn.textContent = 'Start Game';
            pauseBtn.textContent = 'Pause';
            pauseBtn.disabled = true;
            generateFood();
            updateUI();
            drawGame();
        }

        function gameLoop() {
            if (!gameActive || gamePaused) return;

            direction = nextDirection;

            // Move snake
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Check collision with walls
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // Check collision with itself
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            // Check if food is eaten
            if (head.x === food.x && head.y === food.y) {
                score += 10 * level;
                level = Math.floor(score / 100) + 1;
                gameSpeed = Math.max(50, 100 - (level - 1) * 5);
                generateFood();
            } else {
                snake.pop();
            }

            updateUI();
            drawGame();

            setTimeout(gameLoop, gameSpeed);
        }

        function generateFood() {
            let newFood;
            let validPosition = false;

            while (!validPosition) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };

                validPosition = !snake.some(segment => 
                    segment.x === newFood.x && segment.y === newFood.y
                );
            }

            food = newFood;
        }

        function drawGame() {
            // Clear canvas
            ctx.fillStyle = '#8B6F47';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#6B5637';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw food
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(food.x * gridSize + 1, food.y * gridSize + 1, gridSize - 2, gridSize - 2);

            // Draw snake
            for (let i = 0; i < snake.length; i++) {
                if (i === 0) {
                    ctx.fillStyle = '#00ff00';
                } else {
                    ctx.fillStyle = '#00cc00';
                }
                ctx.fillRect(
                    snake[i].x * gridSize + 1,
                    snake[i].y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            }
        }

        function updateUI() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            if (score > highScore) {
                highScore = score;
                saveHighScore();
            }
            highScoreEl.textContent = highScore;
        }

        function endGame() {
            gameActive = false;
            gamePaused = false;
            modalTitle.textContent = 'Game Over!';
            modalMessage.textContent = 'You hit a wall or yourself.';
            modalScore.textContent = `Score: ${score}`;
            gameOverModal.classList.add('show');
        }

        function saveHighScore() {
            localStorage.setItem('snakeHighScore', highScore);
        }

        function loadHighScore() {
            highScoreEl.textContent = highScore;
        }
    </script>
</body>
</html>
